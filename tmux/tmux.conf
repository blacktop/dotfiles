# Current notes:
# - tmux 3.6a
# - Ghostty outside tmux
# - Prefix is Ctrl-a
# - Inside tmux, prefer tmux-native TERM values and advertise RGB explicitly

# reset tmux
# source-file ~/.config/tmux/tmux.reset.conf

# tmux FAQ: inside tmux TERM should be tmux/screen style, not the outer terminal.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -gu default-command
set -g default-shell "$SHELL"

# set -g allow-passthrough on
# set -ga update-environment TERM
# set -ga update-environment TERM_PROGRAM

# Use ctrl-a as prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Use the vertical and horizontal symbols to split the screen
bind | split-window -h
bind - split-window -v

# Killing windows and panes
bind w kill-pane
bind q kill-window

# Reload config file
unbind r
bind r source-file ~/.tmux.conf \; display "🚀 Config reloaded 🚀"

# Clearing the pane
bind-key C-k send-keys -R \; clear-history\; display "🧼 Pane cleared 🧼"

# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1

# Ensure window index numbers get reordered on delete.
set-option -g renumber-windows on

set-window-option -g xterm-keys on

# set terminal title
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"

# auto rename tmux window to current cwd
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# set directory for new windows and panes to current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# zero-out escape time delay
set -s escape-time 0
# Ghostty supports focus reporting; keep it explicit for editors and shells.
set -g focus-events on
# Send tmux copy operations to the system clipboard without trusting arbitrary
# OSC 52 writes from programs running inside panes.
set -s set-clipboard external

# increase history size (from 2,000)
set -g history-limit 1000000 # increase history size (from 2,000)

############
# MOVEMENT #
############

# set search mode to vi style
setw -g mode-keys vi

# Vim style copy-yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-like pane resizing
bind-key -r K resize-pane -U 5
bind-key -r J resize-pane -D 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

bind -n M-Left send-keys -M "b"
bind -n M-Right send-keys -M "f"

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

#---------------------------------
# mouse settings
#---------------------------------
set -g mouse on
bind-key m set -g mouse \; display-message '🐁 Mouse mode: #{?mouse,on,off} 🐁'
#---------------------------------
# tmux plugins
#---------------------------------
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'janoamaral/tokyo-night-tmux'
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'blacktop/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-fpp'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'
#---------------------------------
# nord settings
#---------------------------------
set -g @nord_tmux_show_status_content "1"
# set -g @nord_tmux_date_format "%B %e %Y"
set -g @nord_tmux_date_format "%d %b %Y"
#---------------------------------
# resurrect settings
#---------------------------------
set -g @resurrect-capture-pane-contents 'on'
# Resurrect neovim sessions
set -g @resurrect-strategy-nvim 'session'
#---------------------------------
# continuum settings
#---------------------------------
set -g @continuum-restore 'on'
#---------------------------------
# prefix-highlight settings
#---------------------------------
set -g @prefix_highlight_show_copy_mode 'on'
#---------------------------------
# fzf settings
#---------------------------------
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-bind 'x'
#---------------------------------
# sessionx settings
#---------------------------------
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-preview-ratio '80%'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
#---------------------------------
# thumbs settings
#---------------------------------
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy'
set -g @thumbs-osc52 1
#---------------------------------
# default-shell settings
#---------------------------------
set-option -g default-shell $SHELL
#---------------------------------
# style settings
#---------------------------------
setw -g clock-mode-style 12
set-option -g status-position top

run -b '~/.tmux/plugins/tpm/tpm'
