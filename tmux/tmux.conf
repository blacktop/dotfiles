# Current notes:
# - tmux 3.6a
# - Ghostty outside tmux
# - Prefix is Ctrl-a
# - Inside tmux, prefer tmux-native TERM values and advertise RGB explicitly

# reset tmux
# source-file ~/.config/tmux/tmux.reset.conf

# tmux FAQ: inside tmux TERM should be tmux/screen style, not the outer terminal.
set -g default-terminal "tmux-256color"
# Ghostty supports more than RGB; advertise the modern features agent TUIs rely
# on so tmux can pass them through correctly.
set -as terminal-features ",xterm-ghostty:RGB:clipboard:ccolour:cstyle:extkeys:focus:hyperlinks:osc7:sync:title"
set -gu default-command
set -g default-shell "$SHELL"

# Let terminal-native notifications and progress updates from agent TUIs reach
# the outer terminal while the pane is visible.
set -g allow-passthrough on
# set -ga update-environment TERM
# set -ga update-environment TERM_PROGRAM

# Use ctrl-a as prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Use the vertical and horizontal symbols to split the screen
bind | split-window -h \; select-pane -T "#{b:pane_current_path}"
bind - split-window -v \; select-pane -T "#{b:pane_current_path}"

# Killing windows and panes
bind w kill-pane
bind q kill-window

# Reload config file
unbind r
bind r source-file ~/.tmux.conf \; display "🚀 Config reloaded 🚀"

# Clearing the pane
bind-key C-k send-keys -R \; clear-history\; display "🧼 Pane cleared 🧼"

# Rename the active pane title shown in its border.
bind-key T command-prompt -p "Pane title: " "select-pane -T '%%'"

# Start windows and panes index at 1, not 0.
set -g base-index 1
setw -g pane-base-index 1

# Ensure window index numbers get reordered on delete.
set-option -g renumber-windows on

set-window-option -g xterm-keys on

# set terminal title
set-option -g set-titles on
set-option -g set-titles-string "#S / #W"
# Keep shell prompt escape sequences from overwriting manual pane titles.
set-option -g allow-set-title off

# auto rename tmux window to current cwd
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# set directory for new windows and panes to current directory
bind u split-window -l 25% -v -c "#{pane_current_path}" \; select-pane -T "#{b:pane_current_path}"
bind i split-window -l 50% -h -c "#{pane_current_path}" \; select-pane -T "#{b:pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}" \; select-pane -T "#{b:pane_current_path}"
bind % split-window -h -c "#{pane_current_path}" \; select-pane -T "#{b:pane_current_path}"

# zero-out escape time delay
set -s escape-time 0
# Let modern TUIs request richer modified-key sequences when they support them.
set -g extended-keys on
# Ghostty supports focus reporting; keep it explicit for editors and shells.
set -g focus-events on
# Send tmux copy operations to the system clipboard without trusting arbitrary
# OSC 52 writes from programs running inside panes.
set -s set-clipboard external

# increase history size (from 2,000)
set -g history-limit 1000000 # increase history size (from 2,000)

############
# MOVEMENT #
############

# set search mode to vi style
setw -g mode-keys vi

# Vim style copy-yank
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# Keep mouse drag selection from auto-copying on release; use y when you want
# tmux to own the clipboard, and Shift-drag for Ghostty-native selection.
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vim-like pane resizing
bind-key -r K resize-pane -U 5
bind-key -r J resize-pane -D 5
bind-key -r H resize-pane -L 5
bind-key -r L resize-pane -R 5

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

bind -n M-Left send-keys -M "b"
bind -n M-Right send-keys -M "f"

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# repeatable layout cycling (even-horizontal <-> even-vertical)
bind-key -r Space if-shell -F "#{@even_h}" \
  "select-layout even-vertical;  set -w @even_h ''" \
  "select-layout even-horizontal; set -w @even_h 1"

#---------------------------------
# mouse settings
#---------------------------------
# Keep tmux mouse navigation enabled, but disable tmux-yank's mouse-release
# copy so a normal click or drag does not clobber the clipboard.
set -g mouse on
set -g @yank_with_mouse off
bind-key m set -g mouse \; display-message '🐁 Mouse mode: #{?mouse,on,off} 🐁'
#---------------------------------
# tmux plugins
#---------------------------------
set-environment -g TMUX_PLUGIN_MANAGER_PATH "~/.tmux/plugins"
set -g @plugin 'tmux-plugins/tpm'
#set -g @plugin 'janoamaral/tokyo-night-tmux'
# set -g @plugin 'dreamsofcode-io/catppuccin-tmux'
# Keep Nord as a fallback: uncomment this and comment Rose Pine to switch back.
# set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'blacktop/tmux-sessionx'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-fpp'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'wfxr/tmux-fzf-url'
# Must load after rose-pine: it rewrites the #{music_status}/#{artist}/#{track}
# placeholders that rose-pine bakes into status-right.
set -g @plugin 'robhurring/tmux-spotify'
set -g @plugin 'blacktop/tmux-assistant-resurrect'
# set -g @plugin 'qeesung/tmux-scout' # Agent session monitor; left disabled for now.
#---------------------------------
# nord settings
#---------------------------------
set -g @nord_tmux_show_status_content "1"
# set -g @nord_tmux_date_format "%B %e %Y"
set -g @nord_tmux_date_format "%d %b %Y"
#---------------------------------
# rose pine settings
#---------------------------------
#set -g @rose_pine_variant 'moon'
set -g @rose_pine_host 'on'
set -g @rose_pine_hostname_short 'on'
set -g @rose_pine_date_time '%d %b %H:%M'
set -g @rose_pine_directory 'on'
# Keep Rose Pine rendering #W so `rename-window` can override automatic names.
set -g @rose_pine_show_pane_directory ''
set -g @rose_pine_default_window_behavior 'on'
set -g @rose_pine_disable_active_window_menu 'on'
set -g @rose_pine_left_separator ' · '
set -g @rose_pine_right_separator ' · '
set -g @rose_pine_field_separator '  '
set -g @rose_pine_window_status_separator '  '
set -g @rose_pine_session_icon ''
set -g @rose_pine_folder_icon ''
set -g @rose_pine_hostname_icon '󰒋'
set -g @rose_pine_date_time_icon '󰃰'
set -g @rose_pine_status_left_prepend_section '#{prefix_highlight} '
#---------------------------------
# resurrect settings
#---------------------------------
set -g @resurrect-capture-pane-contents 'on'
# Resurrect neovim sessions
set -g @resurrect-strategy-nvim 'session'
# Restore assistant sessions with the account-specific config/home they used.
set -g @assistant-resurrect-capture-env 'CLAUDE_CONFIG_DIR CODEX_HOME'
set -g @assistant-resurrect-claude-config-dirs '~/.claude ~/.claude-team'
set -g @assistant-resurrect-codex-homes '~/.codex ~/.codex-team'
#---------------------------------
# continuum settings
#---------------------------------
set -g @continuum-restore 'on'
#---------------------------------
# prefix-highlight settings
#---------------------------------
set -g @prefix_highlight_fg '#232136'
set -g @prefix_highlight_bg '#f6c177'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_prefix_prompt 'C-a'
set -g @prefix_highlight_copy_prompt 'copy'
set -g @prefix_highlight_output_prefix '#[fg=#f6c177,bg=#232136]#[fg=#232136,bg=#f6c177,bold]'
set -g @prefix_highlight_output_suffix '#[fg=#f6c177,bg=#232136]'
set -g @prefix_highlight_copy_mode_attr 'fg=#232136,bg=#c4a7e7,bold'
#---------------------------------
# fzf settings
#---------------------------------
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-bind 'x'
#---------------------------------
# sessionx settings
#---------------------------------
set -g @sessionx-auto-accept 'off'
set -g @sessionx-bind 'o'
set -g @sessionx-preview-ratio '80%'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
#---------------------------------
# thumbs settings
#---------------------------------
set -g @thumbs-key F
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy'
set -g @thumbs-osc52 1
#---------------------------------
# spotify settings
#---------------------------------
# Call tmux-spotify's scripts directly instead of its #{artist}-style
# placeholders: the placeholder rewrite races rose-pine's slow status-right
# rebuild on reload and intermittently leaves literal text in the bar.
# Iris (#c4a7e7) keeps the music section visually distinct from the hostname
# (#e0def4); the trailing muted ' ·' matches the theme's section dividers.
set -g @rose_pine_status_right_prepend_section '#[fg=#c4a7e7]♫ #(~/.tmux/plugins/tmux-spotify/scripts/status.sh) #(~/.tmux/plugins/tmux-spotify/scripts/artist.sh): #(~/.tmux/plugins/tmux-spotify/scripts/track.sh)#[fg=#908caa] ·'
# Right-edge padding to mirror the one-space gap on the status bar's left edge.
set -g @rose_pine_status_right_append_section ' '
set -g @spotify_playing_icon '󰐊'
set -g @spotify_paused_icon '󰏤'
# Single space so no stray icon shows when Spotify is closed or stopped.
set -g @spotify_stopped_icon ' '
#---------------------------------
# pane border/title settings
#---------------------------------
set -g pane-border-status top
set -g pane-border-lines single
set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#f6c177"
set -g pane-border-format "#{?pane_active,#[fg=#f6c177,bold],#[fg=#908caa]} #P · #{pane_title} #[default]"
set -g display-panes-colour "#908caa"
set -g display-panes-active-colour "#f6c177"
# style settings
#---------------------------------
setw -g clock-mode-style 12
set-option -g status-position top
set-option -g status-justify left

run -b '~/.tmux/plugins/tpm/tpm'
