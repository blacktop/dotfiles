# ── Model ────────────────────────────────────────────────────────────────────
model = "gpt-5.5"
model_reasoning_effort = "xhigh"
model_context_window = 1000000
model_auto_compact_token_limit = 960000
tool_output_token_limit = 25000
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"
personality = "pragmatic"
web_search = "live"

# ── Sandbox & approvals ─────────────────────────────────────────────────────
sandbox_mode = "workspace-write"
approvals_reviewer = "auto_review"

[sandbox_workspace_write]
network_access = true
writable_roots = [
  "${HOME}/Library/Caches/go-build",
  "${HOME}/go/pkg/mod",
  "${HOME}/go/pkg/sumdb",
  "${HOME}/go/bin",
  "${HOME}/.cargo",
  "${HOME}/.rustup",
  "${HOME}/Library/pnpm",
  "${HOME}/Library/Caches/node-gyp",
  "${HOME}/Library/Caches/pnpm",
  "${HOME}/Library/Caches/corepack",
]

# ── Shell environment ────────────────────────────────────────────────────────
[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY = "1"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
DISABLE_ERROR_REPORTING = "1"
DISABLE_TELEMETRY = "1"

# ── Feature flags ────────────────────────────────────────────────────────────
# Removed/no-op flags (always on): sqlite, steer, collaboration_modes
# Deprecated flags (use top-level): web_search_request → web_search
[features]
apps = true                    # Connected ChatGPT Apps
default_mode_request_user_input = true
ghost_commit = false           # Git snapshots per turn (key: "undo")
guardian_approval = true       # Sub-agent reviews approvals for safety
js_repl = true                 # Node.js JavaScript REPL
memories = true                # Persistent agent memories
multi_agent = true             # Spawn parallel sub-agents
prevent_idle_sleep = true      # Keep Mac awake during turns
shell_snapshot = true          # Shell state snapshotting
skills = true                  # Skill system
unified_exec = true            # Single PTY-backed exec tool
view_image_tool = true         # Image viewing capability
voice_transcription = true     # Voice dictation (Ctrl+M)
terminal_resize_reflow = true
goals = true

# ── Multi-agent ──────────────────────────────────────────────────────────────
# Agent roles are auto-discovered from $CODEX_HOME/agents/*.toml — define each role
# as a standalone file with a `name` field; do not duplicate them here.
[agents]
max_threads = 12

# ── TUI ──────────────────────────────────────────────────────────────────────
[tui]
network_access = true
notifications = true
theme = "catppuccin-mocha"

# ── Trust ────────────────────────────────────────────────────────────────────
[projects."${HOME}/Developer/Mine/blacktop"]
trust_level = "trusted"

# ── MCP servers ──────────────────────────────────────────────────────────────
# ida-pro is always available (no key needed)
[mcp_servers.ida-pro]
command = "/opt/homebrew/bin/ida-mcp"

# Key-dependent servers (context7, exa, mcp-tts) are appended by mcp-setup.sh
# only when the user provides credentials. Do not add them here.

# ── Plugins ──────────────────────────────────────────────────────────────────
[plugins."github@openai-curated"]
enabled = true

[plugins."build-ios-apps@openai-curated"]
enabled = true
